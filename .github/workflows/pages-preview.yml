# TEMPORARY preview deployment to GitHub Pages.
#
# Builds the Astro site and rewrites root-absolute URLs so it works under
# https://nathanwoltermann-ui.github.io/greenfield-acres-realty/
#
# Limitations of the Pages preview (all solved on Netlify, the real host):
#   - contact form & wizard lead emails don't send (no Netlify Forms)
#   - /api/featured & /api/concierge don't exist (site falls back gracefully)
#   - the old-URL 301 redirects in public/_redirects are ignored
#
# ➜ DELETE THIS FILE once the site is live on Netlify.

name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Rewrite root-absolute URLs for the repo subpath
        run: |
          find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -print0 |
            xargs -0 sed -i -E \
              -e 's#(href|src|action)="/([^/"])#\1="/greenfield-acres-realty/\2#g' \
              -e 's#(href|src|action)="/"#\1="/greenfield-acres-realty/"#g'

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
